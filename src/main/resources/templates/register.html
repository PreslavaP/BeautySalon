<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация - Салон за красота</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <h2>Регистрация в Grace & Glow</h2>
            <form th:action="@{/register}" method="post">
                <div class="form-group">
                    <label>Потребителско име:</label>
                    <input type="text" name="username" required placeholder="Изберете потребителско име" />
                </div>
                <div class="form-group">
                    <label>Е-мейл:</label>
                    <input type="email" name="email" required placeholder="example@mail.com" />
                </div>
                <div class="form-group">
                    <label>Парола:</label>
                    <input type="password" name="password" required placeholder="Въведете парола" />
                </div>
                <button type="submit" class="btn-book">Регистрирай се</button>
            </form>
            <div class="login-footer">
                <p>Вече имате профил? <a th:href="@{/login}">Влезте оттук</a></p>
                <a th:href="@{/}" class="back-link">← Назад към сайта</a>
            </div>
        </div>
    </div>
</body>
</html>
