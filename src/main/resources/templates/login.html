<!DOCTYPE html>
<html lang="bg" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход - Салон за красота</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="login-wrapper">
    <div class="login-box">
        <h2>Вход в Grace & Glow</h2>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Потребителско име или Е-мейл:</label>
                <input type="text" name="username" required placeholder="Въведете потребителско име" />
            </div>
            <div class="form-group">
                <label>Парола:</label>
                <input type="password" name="password" required placeholder="Въведете парола" />
            </div>
            <button type="submit" class="btn-book">Влез</button>
        </form>
        <div class="login-footer">
            <p>Нямате профил? <a th:href="@{/register}">Регистрирайте се тук</a></p>
            <a th:href="@{/}" class="back-link">← Назад към сайта</a>
        </div>
    </div>
</div>
</body>
</html>
